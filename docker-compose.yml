services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insurance_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: insurance_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: insurance_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-insurance_quotation}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
